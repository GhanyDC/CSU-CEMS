<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CEMS{% endblock %} — Campus Election Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    {% load static %}
    <link href="{% static 'css/cems.css' %}" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block navbar %}{% endblock %}

    <main class="{% block main_class %}container py-4{% endblock %}">
        <!-- Toast container for notifications -->
        <div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container"></div>

        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-3 mt-auto border-top">
        <small>&copy; 2026 CEMS — Campus Election Management System</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% load static %}
    <script src="{% static 'js/cems.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
