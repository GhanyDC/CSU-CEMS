{% extends "frontend/base.html" %}
{% load static %}

{% block title %}Login{% endblock %}

{% block main_class %}{% endblock %}

{% block content %}
<div class="login-page d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card card shadow-lg border-0" style="max-width: 440px; width: 100%;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="login-icon mb-3">
                    <i class="bi bi-ballot-fill text-primary" style="font-size: 3rem;"></i>
                </div>
                <h2 class="fw-bold text-primary">CEMS</h2>
                <p class="text-muted">Campus Election Management System</p>
            </div>

            <div id="login-alert" class="alert d-none" role="alert"></div>

            <form id="login-form" novalidate>
                <div class="mb-3">
                    <label for="student_id" class="form-label fw-semibold">
                        <i class="bi bi-person-badge"></i> Student ID
                    </label>
                    <input type="text" class="form-control form-control-lg" id="student_id"
                           placeholder="e.g. 2024-10015" required autocomplete="username">
                </div>
                <div class="mb-4">
                    <label for="date_of_birth" class="form-label fw-semibold">
                        <i class="bi bi-calendar-date"></i> Date of Birth
                    </label>
                    <input type="date" class="form-control form-control-lg" id="date_of_birth"
                           required autocomplete="bday">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100" id="login-btn">
                    <span id="login-text">Sign In</span>
                    <span id="login-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">
                    <i class="bi bi-shield-lock"></i> Secured with session-based authentication
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const spinner = document.getElementById('login-spinner');
    const text = document.getElementById('login-text');
    const alert = document.getElementById('login-alert');

    btn.disabled = true;
    spinner.classList.remove('d-none');
    text.textContent = 'Signing in...';
    alert.classList.add('d-none');

    try {
        const res = await CEMS.api('/api/auth/login/', {
            method: 'POST',
            body: JSON.stringify({
                student_id: document.getElementById('student_id').value.trim(),
                date_of_birth: document.getElementById('date_of_birth').value
            })
        });

        if (res.success) {
            // Store user info in sessionStorage for UI use
            sessionStorage.setItem('cems_user', JSON.stringify({
                student_id: res.student_id,
                full_name: res.full_name,
                is_admin: res.is_admin || false
            }));
            window.location.href = '/dashboard/';
        } else {
            alert.className = 'alert alert-danger';
            alert.textContent = res.error || 'Login failed.';
            alert.classList.remove('d-none');
        }
    } catch (err) {
        alert.className = 'alert alert-danger';
        alert.textContent = err.message || 'Network error. Please try again.';
        alert.classList.remove('d-none');
    } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
        text.textContent = 'Sign In';
    }
});
</script>
{% endblock %}
