# ---------------------------------------------------------------------------
# CEMS – Docker Compose (production / external demo)
# ---------------------------------------------------------------------------
# Usage:
#   cp .env.example .env  # edit with real values
#   docker compose -f docker-compose.prod.yml up -d --build
# ---------------------------------------------------------------------------
services:
  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cems}
      POSTGRES_USER: ${POSTGRES_USER:-cems}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cems} -d ${POSTGRES_DB:-cems}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Do NOT expose port 5432 in production

  # ---------- Django application (gunicorn) ----------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/production.txt
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in .env}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_RUN_MIGRATIONS: ${DJANGO_RUN_MIGRATIONS:-1}
      DJANGO_COLLECTSTATIC: ${DJANGO_COLLECTSTATIC:-1}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-cems}
      POSTGRES_USER: ${POSTGRES_USER:-cems}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # ---------- Nginx reverse proxy ----------
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      # Publish 443 only if this Nginx container is configured to terminate TLS.
      # Otherwise keep TLS at an upstream load balancer or reverse proxy.
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      # Mount SSL certs here for production:
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
  logs_volume:
